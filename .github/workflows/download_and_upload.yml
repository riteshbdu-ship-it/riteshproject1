name: 24-Hour CSV Refresh

on:
  schedule:
    - cron: '0 0 * * *' # Automatically refreshes every 24 hours
  workflow_dispatch: # Keeps the manual "Run workflow" button active

jobs:
  refresh-data:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download the raw file directly from Crossref's GitLab 
      - name: Download CSV File
        run: |
          curl -L -o retraction_watch.csv "https://gitlab.com"

      # Step 2: Sync and upload the file to your Google Drive folder
      - name: Upload to Google Drive
        uses: Jambo-dev/google-drive-upload-action@v1.1.1
        with:
          credentials: ${{ secrets.GSA_CREDENTIALS }}
          filename: 'retraction_watch.csv'
          folderId: ${{ secrets.DRIVE_FOLDER_ID }}
          overwrite: 'true'
